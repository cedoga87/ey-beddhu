<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ey Beddhu!</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0F0E0C;
  --surface: #1A1916;
  --surface2: #222019;
  --ink: #F0EDE6;
  --ink2: #9A9180;
  --ink3: #5C5548;
  --border: rgba(240,237,230,0.08);
  --border2: rgba(240,237,230,0.15);
  --green: #3D7A52;
  --green-light: rgba(61,122,82,0.15);
  --green-text: #7EBF94;
  --amber: #B87333;
  --amber-light: rgba(184,115,51,0.12);
  --amber-text: #D4956A;
  --red: #C0392B;
  --red-light: rgba(192,57,43,0.15);
  --serif: 'Lora', Georgia, serif;
  --sans: 'Outfit', system-ui, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ---- Top bar ---- */
.topbar {
  width: 100%;
  max-width: 520px;
  padding: 16px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.5s ease both;
}

.brand { display: flex; flex-direction: column; }
.brand h1 { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--ink); line-height: 1; letter-spacing: -0.01em; }
.brand h1 em { font-style: italic; color: var(--green-text); }
.brand p { font-size: 10px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

.gear-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink2); transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
}
.gear-btn:hover, .gear-btn.active { background: var(--surface2); color: var(--ink); }

/* ---- Settings drawer ---- */
.settings-drawer {
  width: 100%; max-width: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin: 10px 20px 0;
  padding: 18px;
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: slideDown 0.2s ease both;
}
.settings-drawer.open { display: flex; }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

.s-label { font-size: 10px; font-weight: 500; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.s-input {
  width: 100%; padding: 11px 14px; font-size: 14px; font-family: var(--sans);
  background: var(--bg); border: 1px solid var(--border2); border-radius: 12px;
  color: var(--ink); letter-spacing: 0.03em;
}
.s-input:focus { outline: none; border-color: var(--green); }
.s-input::placeholder { color: var(--ink3); }
.s-hint { font-size: 11px; color: var(--ink3); line-height: 1.5; margin-top: 2px; }
.s-save {
  padding: 11px 20px; font-size: 14px; font-weight: 500; font-family: var(--sans);
  background: var(--green); color: #fff; border: none; border-radius: 12px;
  cursor: pointer; align-self: flex-start; transition: opacity 0.15s;
}
.s-save:hover { opacity: 0.85; }

/* ---- Main content ---- */
.main {
  width: 100%; max-width: 520px;
  padding: 16px 20px 100px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ---- Controls ---- */
.controls { display: flex; gap: 8px; }
.pill-group {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; flex: 1;
}
.pill-group button {
  flex: 1; padding: 10px 6px; font-size: 13px; font-weight: 400;
  font-family: var(--sans); background: transparent; border: none;
  color: var(--ink2); cursor: pointer; transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.pill-group button:not(:last-child) { border-right: 1px solid var(--border); }
.pill-group button.on { background: var(--surface2); color: var(--ink); font-weight: 500; }

/* ---- Editor ---- */
.editor-wrap { position: relative; }
textarea {
  width: 100%; min-height: 140px;
  padding: 16px 16px 52px 16px;
  font-size: 16px; line-height: 1.65; font-family: var(--sans);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; color: var(--ink); resize: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
textarea:focus { outline: none; border-color: var(--green); }
textarea::placeholder { color: var(--ink3); }

.editor-footer {
  position: absolute; bottom: 12px; left: 12px; right: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.char-hint { font-size: 11px; color: var(--ink3); }

.mic-wrap { display: flex; align-items: center; gap: 8px; }
.mic-status-txt { font-size: 11px; color: var(--red); font-weight: 500; display: none; }

.mic-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink2); transition: all 0.2s; flex-shrink: 0;
}
.mic-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
.mic-btn.recording { background: var(--red-light); border-color: var(--red); color: var(--red); animation: pulse 1.2s ease infinite; }
.mic-btn.processing { background: var(--green-light); border-color: var(--green); color: var(--green-text); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.3)} 50%{box-shadow:0 0 0 8px rgba(192,57,43,0)} }

.mic-lang-sel {
  font-size: 12px; padding: 5px 8px;
  border: 1px solid var(--border2); border-radius: 8px;
  background: var(--surface2); color: var(--ink2); font-family: var(--sans); cursor: pointer;
}

/* ---- Go button ---- */
.go-btn {
  width: 100%; padding: 18px;
  font-size: 17px; font-weight: 600; font-family: var(--sans);
  background: var(--green); color: #fff;
  border: none; border-radius: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-appearance: none;
}
.go-btn:hover { opacity: 0.9; }
.go-btn:active { transform: scale(0.98); }
.go-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.go-spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Results ---- */
.results { display: flex; flex-direction: column; gap: 10px; }

.result-card {
  background: var(--green-light);
  border: 1px solid rgba(61,122,82,0.25);
  border-radius: 20px; padding: 16px;
  animation: fadeUp 0.3s ease both;
}
.result-card.formale {
  background: var(--amber-light);
  border-color: rgba(184,115,51,0.25);
}

.rc-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--green-text); margin-bottom: 10px;
}
.result-card.formale .rc-label { color: var(--amber-text); }

.rc-text {
  font-family: var(--serif); font-size: 18px; font-weight: 600;
  color: var(--ink); line-height: 1.6; margin-bottom: 14px;
}

.rc-actions { display: flex; gap: 8px; align-items: center; }
.rc-action {
  padding: 8px 14px; font-size: 13px; font-family: var(--sans);
  background: rgba(240,237,230,0.06); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--ink2); cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  transition: background 0.15s, color 0.15s;
  -webkit-appearance: none;
}
.rc-action:hover { background: rgba(240,237,230,0.1); color: var(--ink); }
.rc-action:disabled { opacity: 0.4; cursor: not-allowed; }
.mini-spin { width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--ink2); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }

.copy-btn {
  margin-left: auto; padding: 8px 16px; font-size: 13px; font-weight: 500;
  font-family: var(--sans); background: var(--ink); color: var(--bg);
  border: none; border-radius: 10px; cursor: pointer;
  transition: opacity 0.15s; -webkit-appearance: none;
}
.copy-btn:hover { opacity: 0.85; }

/* ---- Error ---- */
.err-box {
  background: var(--red-light); border: 1px solid rgba(192,57,43,0.3);
  border-radius: 16px; padding: 14px 16px; font-size: 14px; color: #E57373;
}

/* ---- Animations ---- */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.topbar { animation-delay: 0s; }
.main { animation: fadeUp 0.5s 0.05s ease both; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <h1>Ey <em>Beddhu!</em></h1>
    <p>IT · EN · FR</p>
  </div>
  <button class="gear-btn" id="gear-btn" title="Impostazioni">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<div class="settings-drawer" id="settings-drawer">
  <div>
    <div class="s-label">Anthropic API key</div>
    <input type="password" class="s-input" id="api-key" placeholder="sk-ant-…" />
  </div>
  <div>
    <div class="s-label">OpenAI API key <span style="font-weight:300;text-transform:none;letter-spacing:0;color:var(--ink3);">— opzionale (Whisper auto-detect)</span></div>
    <input type="password" class="s-input" id="oai-key" placeholder="sk-… oppure lascia vuoto" />
    <div class="s-hint">Senza: microfono del browser (scegli lingua). Con: Whisper rileva IT/EN/FR automaticamente.</div>
  </div>
  <button class="s-save" onclick="saveKeys()">Salva</button>
</div>

<div class="main">
  <div class="controls">
    <div class="pill-group" id="tone-seg">
      <button class="on" data-v="auto">Auto</button>
      <button data-v="informale">Inform.</button>
      <button data-v="formale">Formale</button>
    </div>
    <div class="pill-group" id="ctx-seg" style="flex:0.75;">
      <button class="on" data-v="fresh">Nuovo</button>
      <button data-v="linked">↺ Ctx</button>
    </div>
  </div>

  <div class="editor-wrap">
    <textarea id="txt" placeholder="Scrivi, parla, incolla…" rows="5"></textarea>
    <div class="editor-footer">
      <span class="char-hint" id="char-hint"></span>
      <div class="mic-wrap">
        <span class="mic-status-txt" id="mic-status-txt">In ascolto…</span>
        <select id="mic-lang" class="mic-lang-sel">
          <option value="it-IT">🇮🇹 IT</option>
          <option value="en-GB">🇬🇧 EN</option>
          <option value="fr-FR">🇫🇷 FR</option>
        </select>
        <button class="mic-btn" id="mic-btn">
          <svg id="mic-icon" viewBox="0 0 24 24">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button class="go-btn" id="go-btn">
    <div class="go-spinner" id="go-spinner"></div>
    <span id="go-lbl">Traduci / Correggi</span>
  </button>

  <div class="results" id="results"></div>
</div>

<script>
var tone = 'auto', ctx = 'fresh', history = [];

// Restore keys
var sAnt = sessionStorage.getItem('ant_key');
var sOai = sessionStorage.getItem('oai_key');
if (sAnt) document.getElementById('api-key').value = sAnt;
if (sOai) document.getElementById('oai-key').value = sOai;

// Gear toggle
document.getElementById('gear-btn').onclick = function() {
  var d = document.getElementById('settings-drawer');
  var btn = document.getElementById('gear-btn');
  var open = d.classList.toggle('open');
  btn.classList.toggle('active', open);
};

function saveKeys() {
  var a = document.getElementById('api-key').value.trim();
  var o = document.getElementById('oai-key').value.trim();
  if (a) sessionStorage.setItem('ant_key', a);
  if (o) sessionStorage.setItem('oai_key', o);
  document.getElementById('settings-drawer').classList.remove('open');
  document.getElementById('gear-btn').classList.remove('active');
  updateMicUI();
  showToast('Salvato!');
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3D7A52;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;font-family:var(--sans);z-index:999;animation:fadeUp 0.2s ease both;';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

function bindSeg(id, setter) {
  document.getElementById(id).querySelectorAll('button').forEach(function(b) {
    b.onclick = function() {
      document.getElementById(id).querySelectorAll('button').forEach(function(x) { x.classList.remove('on'); });
      b.classList.add('on'); setter(b.dataset.v);
    };
  });
}
bindSeg('tone-seg', function(v) { tone = v; });
bindSeg('ctx-seg', function(v) { ctx = v; if (v === 'fresh') { history = []; } });

// Char count
document.getElementById('txt').addEventListener('input', function() {
  var n = this.value.length;
  document.getElementById('char-hint').textContent = n > 0 ? n + ' car.' : '';
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyEl(id, btn) {
  var text = document.getElementById(id).textContent;
  function ok() { btn.textContent = '✓ Copiato'; setTimeout(function() { btn.textContent = 'Copia'; }, 1500); }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(ok).catch(fb);
  } else { fb(); }
  function fb() {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); ok(); } catch(e) { alert(text); }
    document.body.removeChild(ta);
  }
}

async function transformText(uid, mode, btn) {
  var apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('Configura prima la tua API key nelle impostazioni.'); return; }
  var el = document.getElementById(uid);
  var orig = el.textContent.trim();
  if (!orig) return;
  var sp = btn.querySelector('.mini-spin');
  btn.disabled = true; sp.style.display = 'inline-block';
  var prompt = mode === 'rephrase'
    ? 'Rephrase this Italian text differently, same meaning and register. Output ONLY the Italian text:\n\n' + orig
    : 'Shorten this Italian text, keep the core meaning. Output ONLY the Italian text:\n\n' + orig;
  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    var d = await r.json();
    if (d.error) throw new Error(d.error.message);
    var res = (d.content || []).filter(function(b) { return b.type==='text'; }).map(function(b) { return b.text; }).join('').trim();
    if (res) { el.textContent = res; el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'fadeUp 0.3s ease both'; }
  } catch(e) { alert('Errore: ' + (e.message || e)); }
  finally { btn.disabled = false; sp.style.display = 'none'; }
}

// Cmd+Enter
document.getElementById('txt').addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') document.getElementById('go-btn').click();
});

document.getElementById('go-btn').onclick = async function() {
  var apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) {
    document.getElementById('settings-drawer').classList.add('open');
    document.getElementById('gear-btn').classList.add('active');
    document.getElementById('api-key').focus();
    return;
  }
  var text = document.getElementById('txt').value.trim();
  if (!text) return;

  var btn = document.getElementById('go-btn');
  var sp = document.getElementById('go-spinner');
  var lbl = document.getElementById('go-lbl');
  var out = document.getElementById('results');

  btn.disabled = true; sp.style.display = 'block'; lbl.textContent = '…'; out.innerHTML = '';

  var toneInstr = tone === 'auto'
    ? 'If the social context is unclear, provide TWO results: "Informale (Tu)" and "Formale (Lei)".'
    : tone === 'informale' ? 'ONE result labeled "Informale". Informal register (Tu).'
    : 'ONE result labeled "Formale". Formal register (Lei).';

  var sys = 'You are a specialized Italian language assistant.\n- If input is Italian: correct it to sound like a native speaker.\n- If input is English or French: translate into natural standard Italian.\n- Use "Italiano Vero" — how Italians actually speak today. No slang, no archaic phrasing.\n- ' + toneInstr + '\n- Be concise. Output only Italian text ready to copy-paste.\n- If context was used, set context_used: true.\n\nRespond ONLY with valid JSON:\n{"context_used":false,"results":[{"label":"Informale (Tu)","text":"..."}]}';

  var userMsg = { role: 'user', content: text };
  var msgs = (ctx === 'linked' && history.length > 0) ? history.concat([userMsg]) : [userMsg];

  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: sys, messages: msgs })
    });
    var d = await r.json();
    if (d.error) throw new Error(d.error.message);
    var raw = (d.content || []).filter(function(b) { return b.type==='text'; }).map(function(b) { return b.text; }).join('');
    var parsed = JSON.parse(raw.replace(/```json|```/gi,'').trim());

    if (ctx === 'linked') {
      history.push(userMsg);
      history.push({ role: 'assistant', content: raw });
      if (history.length > 12) history = history.slice(-12);
    }

    var html = '';
    (parsed.results || []).forEach(function(res, i) {
      var isF = res.label && res.label.toLowerCase().indexOf('formale') !== -1;
      var uid = 'rt' + Date.now() + i;
      html += '<div class="result-card' + (isF ? ' formale' : '') + '">'
        + '<div class="rc-label">' + esc(res.label) + '</div>'
        + '<div class="rc-text" id="' + uid + '">' + esc(res.text) + '</div>'
        + '<div class="rc-actions">'
        + '<button class="rc-action" onclick="transformText(\'' + uid + '\',\'rephrase\',this)"><div class="mini-spin"></div>↺ Riformula</button>'
        + '<button class="rc-action" onclick="transformText(\'' + uid + '\',\'shorten\',this)"><div class="mini-spin"></div>✂ Accorcia</button>'
        + '<button class="copy-btn" onclick="copyEl(\'' + uid + '\',this)">Copia</button>'
        + '</div></div>';
    });
    out.innerHTML = html;
    document.getElementById('txt').value = '';
    document.getElementById('char-hint').textContent = '';

  } catch(e) {
    out.innerHTML = '<div class="err-box">Errore: ' + esc(e.message || String(e)) + '</div>';
  } finally {
    btn.disabled = false; sp.style.display = 'none'; lbl.textContent = 'Traduci / Correggi';
  }
};

// ---- MIC ----
var micBtn = document.getElementById('mic-btn');
var micIcon = document.getElementById('mic-icon');
var micStatusTxt = document.getElementById('mic-status-txt');
var micLangSel = document.getElementById('mic-lang');
var mediaRecorder = null, audioChunks = [], isRecording = false;
var recognition = null, isListening = false;

var SVG_MIC = '<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>';
var SVG_STOP = '<rect x="6" y="6" width="12" height="12" rx="3" fill="currentColor" stroke="none"/>';
var SVG_SPIN = '<circle cx="12" cy="12" r="7" stroke-dasharray="22 10" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle>';

function hasOai() { return !!document.getElementById('oai-key').value.trim(); }
function hasSR() { return ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window); }

function updateMicUI() {
  var whisper = hasOai();
  micLangSel.style.display = whisper ? 'none' : (hasSR() ? 'inline-block' : 'none');
  micBtn.disabled = !whisper && !hasSR();
  micBtn.title = whisper ? 'Auto-detect IT/EN/FR (Whisper)' : 'Parla';
}
document.getElementById('oai-key').addEventListener('input', updateMicUI);
updateMicUI();

function setMicState(s) {
  micBtn.classList.remove('recording','processing');
  micStatusTxt.style.display = 'none';
  if (s === 'idle') {
    micIcon.innerHTML = SVG_MIC; micBtn.disabled = false;
    micLangSel.style.display = hasOai() ? 'none' : (hasSR() ? 'inline-block' : 'none');
  } else if (s === 'recording') {
    micBtn.classList.add('recording'); micIcon.innerHTML = SVG_STOP;
    micStatusTxt.style.display = 'inline'; micLangSel.style.display = 'none';
    micBtn.disabled = false;
  } else if (s === 'processing') {
    micBtn.classList.add('processing'); micIcon.innerHTML = SVG_SPIN;
    micLangSel.style.display = 'none'; micBtn.disabled = true;
    micStatusTxt.style.display = 'inline'; micStatusTxt.textContent = 'Trascrizione…';
  }
}

// Whisper
async function startWhisper() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      setMicState('processing');
      micStatusTxt.textContent = 'Trascrizione…';
      var oaiKey = document.getElementById('oai-key').value.trim();
      try {
        var blob = new Blob(audioChunks, { type: 'audio/webm' });
        var fd = new FormData();
        fd.append('file', blob, 'audio.webm');
        fd.append('model', 'whisper-1');
        var r = await fetch('https://api.openai.com/v1/audio/transcriptions', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + oaiKey }, body: fd
        });
        var d = await r.json();
        if (d.error) throw new Error(d.error.message);
        if (d.text && d.text.trim()) {
          document.getElementById('txt').value = d.text.trim();
          document.getElementById('char-hint').textContent = d.text.trim().length + ' car.';
        }
      } catch(e) { alert('Errore Whisper: ' + (e.message || e)); }
      finally { setMicState('idle'); }
    };
    mediaRecorder.start(); isRecording = true; setMicState('recording');
    micStatusTxt.textContent = 'In ascolto…';
  } catch(e) { alert('Microfono: ' + e.message); setMicState('idle'); }
}
function stopWhisper() { if (mediaRecorder && isRecording) { isRecording = false; mediaRecorder.stop(); } }

// Browser SR
function startBrowserSR() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = true;
  recognition.lang = micLangSel.value;
  recognition.onstart = function() { isListening = true; setMicState('recording'); micStatusTxt.textContent = 'In ascolto…'; };
  recognition.onend = function() { isListening = false; setMicState('idle'); };
  recognition.onerror = function(e) { isListening = false; setMicState('idle'); if (e.error !== 'no-speech' && e.error !== 'aborted') alert('Errore: ' + e.error); };
  recognition.onresult = function(e) {
    var t = '';
    for (var i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('txt').value = t;
    document.getElementById('char-hint').textContent = t.length + ' car.';
  };
  recognition.start();
}
function stopBrowserSR() { if (recognition && isListening) { isListening = false; recognition.stop(); } }

micBtn.onclick = function() {
  if (hasOai()) { if (isRecording) stopWhisper(); else startWhisper(); }
  else if (hasSR()) { if (isListening) stopBrowserSR(); else startBrowserSR(); }
};
</script>
